name: harvverse-copernicus-hackathon

services:
  postgres:
    image: postgres
    container_name: harvverse-copernicus-hackathon-postgres
    environment:
      POSTGRES_DB: harvverse-copernicus-hackathon
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - harvverse-copernicus-hackathon_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  harvverse-copernicus-hackathon_postgres_data:
